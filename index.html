<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samandağ Belediyesi - E-Hizmet</title>

<style>
/* GENEL AYARLAR */
body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5; 
    color: #444;
    overflow-x: hidden;
}
    
/* HEADER */
.header {
    background: #3d4453;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px; 
    color: #fff;
    position: relative;
    z-index: 1000;
}

.logo-area {
    position: relative;
    display: flex;
    align-items: center;
    padding-left: 280px; 
    font-size: 16px;
    font-weight: 500;
    flex-grow: 1;
}

.logo-img, .logo3-img {
    position: absolute;
    top: -30px;
    left: -20px;
    height: 88px;
    z-index: 100;
}

.arkalogo-img {
    position: absolute;
    top: -30px;
    left: 1250px; 
    height: 88px;
    width: auto;
    z-index: 999; 
    display: block !important;
}

.logo3-img { display: none; }

.header-right {
    display: flex;
    align-items: center;
    gap: 20px;
    padding-right: 10px; 
}

.header-icons {
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 1002;
}

.header-icons img {
    height: 25px; 
    width: auto;
    cursor: pointer;
}

/* ANA YAPI */
.main {
    display: flex;
    padding: 20px; 
    gap: 25px;      
    align-items: flex-start;
}

.sidebar {
    width: 236px; 
    flex-shrink: 0;
    background: #fff;
    border-radius: 8px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    border: 1px solid #e0e4e8;
    overflow: hidden;
}

.sidebar-img { width: 100%; display: block; }

.content { flex: 1; min-width: 0; }

.page-title {
    font-family: 'Inter', sans-serif;
    font-size: 18px; 
    font-weight: 350; 
    color: #6c757d; 
    text-transform: uppercase;
    margin-top: 8.5px; 
    margin-left: -6px; 
}

/* KART */
.card {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    padding: 20px;
    min-height: 700px;
    border: 1px solid #eee;
    margin-top: 8px; 
    margin-left: -7px; 
    width: calc(97% + 7px);
    max-width: 100%; 
    box-sizing: border-box; 
}

.y-buton-img {
    cursor: pointer;
    display: block;
    width: 111.5px; 
    position: relative;
    top: -7.8px; 
    margin-bottom: 5px; 
}

.separator-bar {
    height: 1px;
    background-color: #e9ecef; 
    width: calc(100% + 40px); 
    margin-left: -20px; 
    margin-top: 5px;
    margin-bottom: 20px;
}

.pdf-container {
    width: 100%;
    height: 650px;
    border: 1px solid #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
}

/* MOBİL BUTON */
.mobile-menu-btn {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    width: 30px;
    height: 30px;
    position: absolute; 
    right: 15px;
    top: 22px;          
    z-index: 9999;      
}

.mobile-menu-btn span {
    display: block;
    width: 25px;
    height: 3px;
    background-color: rgba(255, 255, 255, 0.5); 
    border-radius: 2px;
}

/* KIZAKLI MENÜ (SADECE MOBİL İÇİN) */
.mobile-slide-container {
    display: none; /* Masaüstünde kapalı */
    position: absolute;
    top: 70px;
    left: 0;
    width: 100%;
    background: #fff;
    z-index: 998;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.4s ease-in-out;
}

.mobile-slide-container.active {
    max-height: 1000px; /* Kızak gibi inmesini sağlar */
}

.mobile-slide-img { width: 100%; display: block; }

/* --- MEDYA SORGULARI --- */

/* 1000PX ALTI */
@media (max-width: 1000px) {
    .logo-img, .arkalogo-img { display: none !important; }
    .logo3-img { display: block !important; }
    .sidebar { display: none !important; }
    .header-right { display: none; }
    .mobile-menu-btn { display: flex; }
    .mobile-slide-container { display: block; } /* Container aktif hale gelir ama max-height 0 olduğu için görünmez */
    
    .main { padding: 10px; }
    .card { width: 100%; margin-left: 0; padding: 15px; }
    .pdf-container { height: 75vh; }
    .page-title { margin-left: 5px; font-size: 16px; }
}
    
/*
@media (max-width: 600px) {
    .pdf-container { display: none !important; }
    .mobile-pdf-warning { display: block !important; }
    .card { min-height: auto; }
}
    
*/

@media (max-width: 600px) {
    
    .arkalogo-img .logo-img {
        display: none !important;
    }
    
    .logo3-img {
        display: block !important;
        position: absolute;
        top: -35px;      /* Yukarıdan mesafe (istediğin gibi değiştir) */
        left: -35px;     /* Soldan mesafe (istediğin gibi değiştir) */
        height: 77px;   /* Mobildeki yüksekliği */
        width: auto;
        z-index: 1001;  /* En üstte kalması için */
    }

    /* Yazının logoyla çakışmaması için gerekirse alanı kaydır */
    .logo-area {
        padding-left: 70px; /* Logonun genişliğine göre burayı artır/azalt */
    }

    /* PDF uyarısı ve diğer mevcut 600px kodların burada kalmaya devam etsin */
    .pdf-container { display: none !important; }
    .mobile-pdf-warning { display: block !important; }
    .card { min-height: auto; }
}

    
</style>
</head>

<body>

<div class="header">
    <div class="logo-area">
        <img src="logo.png" class="logo-img">
        <img src="arkalogo.png" class="arkalogo-img">
        <img src="logo3.png" class="logo3-img">
    </div>

    <div class="header-right">
        <button style="background: #e74c3c; border: none; color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;">e-Devlet ile Giriş Yap</button>
        <span style="font-size:13px; cursor:pointer; font-weight:600; white-space: nowrap; color: #fff;">➔ ÜYE GİRİŞİ</span>
        
        <div class="header-icons">
            <img src="edevlet.png" alt="e-Devlet">
            <img src="uyegirisi.png" alt="Üye Girişi">
        </div>
    </div>

    <div class="mobile-menu-btn" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
</div>
    
<div id="slideMenu" class="mobile-slide-container">
    <img src="media1000slidebar.png" alt="Mobil Menü" class="mobile-slide-img">
</div>

<div class="main">
    <div class="sidebar">
        <img src="sol_menu.png" alt="Menü" class="sidebar-img">
    </div>

    <div class="content">
        <div class="page-title">BELGE DOĞRULAMA</div>
        <div class="card">
            <img src="ybuton.png" alt="Yeni Sorgu" class="y-buton-img">
            <div class="separator-bar"></div>
            
            <div class="pdf-container">
                <embed src="Evrak.pdf" type="application/pdf" width="100%" height="100%" />
            </div>

              <div class="mobile-pdf-warning">
                This browser does not support inline PDFs. Please download the PDF to view it: <a href="Evrak.pdf" target="_blank">Download PDF</a>
          </div>
            
        </div>
    </div>
</div>

<div class="footer" style="position: fixed; bottom: 5px; right: 15px; font-size: 11px; color: #999;">SÜRÜM 2.0.888</div>

<script>
function toggleMenu() {
    const slideMenu = document.getElementById('slideMenu');
    // Sadece ekran 1000px altındaysa çalışır
    if (window.innerWidth <= 1000) {
        slideMenu.classList.toggle('active');
    }
}

// Ekran büyütüldüğünde menüyü otomatik kapat
window.addEventListener('resize', function() {
    if (window.innerWidth > 1000) {
        document.getElementById('slideMenu').classList.remove('active');
    }
});
</script>

</body>
</html>
