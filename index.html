<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samandağ Belediyesi - E-Hizmet</title>

<style>
/* GENEL AYARLAR */
body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5; 
    color: #444;
    overflow-x: hidden;
}
    
/* HEADER */
.header {
    background: #3d4453;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px; 
    color: #fff;
    position: relative;
    z-index: 1000;
}

.logo-area {
    position: relative;
    display: flex;
    align-items: center;
    padding-left: 280px; 
    font-size: 16px;
    font-weight: 500;
    flex-grow: 1;
}

.logo-img, .logo3-img {
    position: absolute;
    top: -30px;
    left: -20px;
    height: 88px;
    z-index: 100;
}

.arkalogo-img {
    position: absolute;
    top: -30px;
    left: 1250px; 
    height: 88px;
    width: auto;
    z-index: 999; 
    display: block !important;
}

.logo3-img { display: none; }

.header-right {
    display: flex;
    align-items: center;
    gap: 20px;
    padding-right: 10px; 
}

.header-icons {
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 1002;
}

.header-icons img {
    height: 25px; 
    width: auto;
    cursor: pointer;
}

/* ANA YAPI */
.main {
    display: flex;
    padding: 20px; 
    gap: 25px;      
    align-items: flex-start;
}

.sidebar {
    width: 236px; 
    flex-shrink: 0;
    background: #fff;
    border-radius: 8px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
    border: 1px solid #e0e4e8;
    overflow: hidden;
}

.sidebar-img { width: 100%; display: block; }

.content { flex: 1; min-width: 0; }

.page-title {
    font-family: 'Inter', sans-serif;
    font-size: 18px; 
    font-weight: 350; 
    color: #6c757d; 
    text-transform: uppercase;
    margin-top: 8.5px; 
    margin-left: -6px; 
}

/* KART - AKIŞKAN VE ORANTILI AYAR */
.card {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    padding: 20px;
    min-height: 700px;
    border: 1px solid #eee;
    margin-top: 8px; 
    margin-left: -7px; 
    width: 97%;   
    box-sizing: border-box; /* Padding'in genişliği bozmasını engeller */
}

.y-buton-img {
    cursor: pointer;
    display: block;
    width: 111.5px; 
    position: relative;
    top: -7.8px; 
    margin-bottom: 5px; 
}

.separator-bar {
    height: 1px;
    background-color: #e9ecef; 
    width: calc(100% + 40px); 
    margin-left: -20px; 
    margin-top: 5px;
    margin-bottom: 20px;
}

.pdf-container {
    width: 100%;
    height: 650px;
    border: 1px solid #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
}

/* MEDIA 600 BÜYÜK YAZI */
.mobile-text {
    display: none;
    font-family: 'Inter', sans-serif;
    font-size: 32px;
    font-weight: 400;
    color: #6c757d;
    text-align: left;
    margin-top: 40px;
    letter-spacing: 1px;
}

/* MOBİL BUTON */
.mobile-menu-btn {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    width: 30px;
    height: 30px;
    position: absolute; 
    right: 15px;
    top: 22px;          
    z-index: 9999;      
}

.mobile-menu-btn span {
    display: block;
    width: 25px;
    height: 3px;
    background-color: rgba(255, 255, 255, 0.5); 
    border-radius: 2px;
}

/* --- MEDYA SORGULARI --- */

/* --- 1000PX VE ALTI İÇİN MEDYA SORGUSU --- */
@media (max-width: 1000px) {
    .logo-img, .logo2-img {
        display: none !important;
    }
    .logo3-img {
        display: block !important;
    }

    .sidebar {
        display: none !important;
    }

    .header-right .ed-btn, 
    .header-right span {
        display: none;
    }
    
    .header-right {
        padding-right: 0;
    }

    .mobile-menu-btn {
        display: flex; /* Artık çizgiler görünecek */
    }
    
    .main {
        padding: 10px;
    }
    
    .card {
        width: 100%;
        margin-left: 0;
        padding: 15px;
    }

    .pdf-container {
        height: 80vh; /* Mobilde yüksekliği ekran boyuna göre ayarlar */
    }

    .page-title {
        margin-left: 5px;
        font-size: 16px;
    }
}

/* 600PX VE ALTI: YAZI DÜZELTMESİ */
@media (max-width: 600px) {
    .pdf-container { display: none !important; }
    .mobile-text { 
        display: block !important; 
        visibility: visible !important;
    }
    .card { padding-bottom: 60px; }
    .page-title { display: none; }
}
</style>
</head>

<body>

<div class="header">
    <div class="logo-area">
        <img src="logo.png" class="logo-img">
        <img src="arkalogo.png" class="arkalogo-img">
        <img src="logo3.png" class="logo3-img">
        SAMANDAĞ BELEDİYESİ
    </div>

    <div class="header-right">
        <button style="background: #e74c3c; border: none; color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;">e-Devlet ile Giriş Yap</button>
        <span style="font-size:13px; cursor:pointer; font-weight:600; white-space: nowrap; color: #fff;">➔ ÜYE GİRİŞİ</span>
        
        <div class="header-icons">
            <img src="edevlet.png" alt="e-Devlet">
            <img src="uyegirisi.png" alt="Üye Girişi">
        </div>
    </div>

    <div class="mobile-menu-btn" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
</div>

<div class="main">
    <div class="sidebar" id="mobileSidebar">
        <img src="sol_menu.png" alt="Menü" class="sidebar-img">
    </div>

    <div class="content">
        <div class="page-title">BELGE DOĞRULAMA</div>
        <div class="card">
            <img src="ybuton.png" alt="Yeni Sorgu" class="y-buton-img">
            <div class="separator-bar"></div>
            
            <div class="pdf-container">
                <embed src="Evrak.pdf" type="application/pdf" width="100%" height="100%" />
            </div>

            <div class="mobile-text">BELGE DOĞRULAMA</div>
        </div>
    </div>
</div>

<div class="footer" style="position: fixed; bottom: 5px; right: 15px; font-size: 11px; color: #999;">SÜRÜM 2.0.888</div>

<script>
function toggleMenu() {
    const sidebar = document.getElementById('mobileSidebar');
    if(sidebar.style.display === "block") {
        sidebar.style.display = "none";
    } else {
        sidebar.style.display = "block";
    }
}
</script>

</body>
</html>
